<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Chingus Bingus Simulator 3000</title>
<style>
body {
    margin: 0;
    overflow: hidden;
    background: black;
    font-family: Arial, sans-serif;
}

#menu {
    position: absolute;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: white;
}

button {
    padding: 15px 30px;
    font-size: 20px;
    cursor: pointer;
}

#gameUI {
    position: absolute;
    top: 20px;
    left: 20px;
    color: white;
    font-size: 24px;
    display: none;
}

canvas {
    position: absolute;
    top: 0;
    left: 0;
}
</style>
</head>
<body>

<div id="menu">
    <h1>CHINGUS BINGUS SIMULATOR 3000</h1>
    <button onclick="startGame()">Play</button>
</div>

<div id="gameUI">0</div>
<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let gameState = "menu";

let player = {
    x: 150,
    y: canvas.height / 2,
    size: 60,
    velY: 0,
    mode: "cube"
};

let gravity = 0.6;
let jump = -12;

let clicking = false;
let score = 0;

let level = [
    {type: "spike", x: 600, y: canvas.height - 40},
    {type: "spike", x: 800, y: canvas.height - 40},
    {type: "portal", x: 1000, mode: "ship"},
    {type: "spikeTop", x: 1300, y: 0},
    {type: "spikeBottom", x: 1300, y: canvas.height - 40},
    {type: "portal", x: 1600, mode: "cube"},
    {type: "spike", x: 1800, y: canvas.height - 40}
];

function startGame() {
    document.getElementById("menu").style.display = "none";
    document.getElementById("gameUI").style.display = "block";

    gameState = "playing";
    reset();
}

function reset() {
    player.y = canvas.height / 2;
    player.velY = 0;
    player.mode = "cube";
    score = 0;
}

// Input
document.addEventListener("mousedown", () => clicking = true);
document.addEventListener("mouseup", () => clicking = false);

document.addEventListener("keydown", e => {
    if (e.code === "Space") clicking = true;
});
document.addEventListener("keyup", e => {
    if (e.code === "Space") clicking = false;
});

// Draw Bingus
let img = new Image();
img.src = "bingus.jpg";

// Game loop
function update() {
    requestAnimationFrame(update);

    if (gameState !== "playing") return;

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Movement
    if (player.mode === "cube") {
        player.velY += gravity;
        if (clicking && player.y >= canvas.height - player.size - 1) {
            player.velY = jump;
        }
    } else if (player.mode === "ship") {
        if (clicking) player.velY -= 0.6;
        else player.velY += 0.6;
    }

    player.y += player.velY;

    if (player.y < 0) player.y = 0;
    if (player.y > canvas.height - player.size)
        player.y = canvas.height - player.size;

    // Draw player
    ctx.drawImage(img, player.x, player.y, player.size, player.size);

    // Move level
    level.forEach(obj => obj.x -= 6);

    // Draw & collisions
    level.forEach(obj => {

        if (obj.type === "spike") {
            ctx.fillStyle = "red";
            ctx.fillRect(obj.x, obj.y, 40, 40);

            if (collide(obj.x, obj.y, 40, 40)) reset();
        }

        if (obj.type === "spikeTop") {
            ctx.fillRect(obj.x, obj.y, 40, 40);
            if (collide(obj.x, obj.y, 40, 40)) reset();
        }

        if (obj.type === "spikeBottom") {
            ctx.fillRect(obj.x, obj.y, 40, 40);
            if (collide(obj.x, obj.y, 40, 40)) reset();
        }

        if (obj.type === "portal") {
            ctx.fillStyle = "cyan";
            ctx.fillRect(obj.x, canvas.height/2 - 50, 20, 100);

            if (collide(obj.x, canvas.height/2 - 50, 20, 100)) {
                player.mode = obj.mode;
            }
        }

    });

    score++;
    document.getElementById("gameUI").textContent = score;
}

function collide(x, y, w, h) {
    return (
        player.x < x + w &&
        player.x + player.size > x &&
        player.y < y + h &&
        player.y + player.size > y
    );
}

update();
</script>

</body>
</html>
