<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bingus Chingus Simulator 3000</title>
<style>
    body {
        margin: 0;
        overflow: hidden;
        background: black;
        color: white;
        font-family: Arial, sans-serif;
    }

    #counter {
        position: absolute;
        top: 20px;
        left: 20px;
        font-size: 24px;
    }

    #bingus {
        position: absolute;
        width: 60px;
        left: 120px;
    }

    canvas {
        position: absolute;
        top: 0;
        left: 0;
    }
</style>
</head>
<body>

<div id="counter">0</div>
<canvas id="trail"></canvas>
<img id="bingus" src="bingus.png">

<script>
const bingus = document.getElementById("bingus");
const counterEl = document.getElementById("counter");
const canvas = document.getElementById("trail");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let y = window.innerHeight / 2;
let velocity = 0;

let gravity = 0.4;
let lift = -0.8;

let clicking = false;
let score = 0;

let trail = [];
let obstacles = [];
let speed = 3;

document.addEventListener("mousedown", () => clicking = true);
document.addEventListener("mouseup", () => clicking = false);

document.addEventListener("keydown", (e) => {
    if (e.code === "Space") clicking = true;
});
document.addEventListener("keyup", (e) => {
    if (e.code === "Space") clicking = false;
});

function spawnObstacle() {
    let gapSize = 220; 
    let gapY = Math.random() * (window.innerHeight - gapSize);

    obstacles.push({
        x: window.innerWidth,
        gapY: gapY,
        gapSize: gapSize,
        width: 50
    });
}

setInterval(spawnObstacle, 1600);

function resetGame() {
    y = window.innerHeight / 2;
    velocity = 0;
    obstacles = [];
    trail = [];
    score = 0;
}

function update() {

    if (clicking) {
        velocity += lift;
    } else {
        velocity += gravity;
    }

    velocity = Math.max(Math.min(velocity, 8), -8);

    y += velocity;

    if (y <= 0 || y >= window.innerHeight - 60) {
        resetGame();
    }

    bingus.style.top = y + "px";

    trail.push({x: 120, y: y + 30});
    if (trail.length > 120) trail.shift();

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    ctx.beginPath();
    for (let i = 0; i < trail.length; i++) {
        let p = trail[i];
        p.x -= speed; 

        if (i === 0) ctx.moveTo(p.x, p.y);
        else ctx.lineTo(p.x, p.y);
    }
    ctx.strokeStyle = "white";
    ctx.lineWidth = 2;
    ctx.stroke();

    obstacles.forEach((obs, index) => {
        obs.x -= speed;

        ctx.fillRect(obs.x, 0, obs.width, obs.gapY);

        ctx.fillRect(
            obs.x,
            obs.gapY + obs.gapSize,
            obs.width,
            canvas.height

        let bx = 120;
        let by = y;
        let size = 60;

        if (
            bx < obs.x + obs.width &&
            bx + size > obs.x &&
            (by < obs.gapY || by + size > obs.gapY + obs.gapSize)
        ) {
            resetGame();
        }

        if (obs.x < -60) {
            obstacles.splice(index, 1);
        }
    });


    score += 1;
    counterEl.textContent = score;

    requestAnimationFrame(update);
}

update();
</script>

</body>
</html>
